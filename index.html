<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>1111111 Padel</title>

    <meta name="theme-color" content="#0b0f14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Global Padel" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/logo.png" />

    <style>
      /* Boot splash: SOLO mientras carga JS/CSS */
      #boot-splash{
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        gap: 12px;
        background: #0b0f14;
        color: #fff;
        z-index: 999999;
        text-align: center;
        padding: 24px;
      }
      #boot-splash img{
        width: 120px;
        height: 120px;
        object-fit: contain;
        border-radius: 22px;
        background: rgba(255,255,255,0.08);
        padding: 16px;
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow: 0 18px 60px rgba(0,0,0,0.45);
      }
      #boot-splash .boot-title{ font-weight: 800; font-size: 20px; letter-spacing: .2px; }
      #boot-splash .boot-sub{ font-size: 13px; opacity: .8; }
    </style>
  </head>

  <body>
    <div id="boot-splash" aria-label="Cargando Global Padel">
      <img src="/logo.png" alt="Global Padel" />
      <div class="boot-title">Global Padel</div>
      <div class="boot-sub">Cargando…</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
